<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Public Garden - Lucas Monroe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Photography by Lucas Monroe" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <nav class="site-nav">
      <a href="/" class="site-nav__link" aria-label="Lucas Monroe home">Lucas <em>Monroe</em></a>
    </nav>
  </header>

  <main class="gallery">

    <!-- ─── Template ─────────────────────────────────────
    Copy a <figure> block below and change:
      1. Size class:  gallery__item--sm | --md | --lg | --xl | --xxl
      2. Image src and alt
      3. Caption text
    ──────────────────────────────────────────────────── -->
        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/garden/full/church-garden.webp" alt="Church steeple rising above the Boston Public Garden" loading="eager" />
            <figcaption class="gallery__caption">Steeple From the Garden</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--lg">
            <img class="gallery__image" src="images/garden/full/people-line-water.webp" alt="People sitting along the water in the Public Garden" loading="lazy" />
            <figcaption class="gallery__caption">Relaxing by the Water</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--lg">
            <img class="gallery__image" src="images/garden/full/squirrel.webp" alt="Squirrel eating in the Public Garden" loading="eager" />
            <figcaption class="gallery__caption">Hungry Squirrel</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/garden/full/pru-sunset.webp" alt="Autumn sunset over the Prudential Tower" loading="lazy" />
            <figcaption class="gallery__caption">Autumn Sunset Over the Pru</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--lg">
            <img class="gallery__image" src="images/garden/full/yellow-garden.webp" alt="Golden autumn foliage in the Public Garden" loading="lazy" />
            <figcaption class="gallery__caption">Yellow Day</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--md">
            <img class="gallery__image" src="images/garden/full/red-leaf-frame.webp" alt="Red autumn leaves framing a garden view" loading="lazy" />
            <figcaption class="gallery__caption">Autumn Leaves</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/garden/full/garden-morning.webp" alt="Geese on a crispy morning in the Public Garden" loading="lazy" />
            <figcaption class="gallery__caption">Crispy Morning With the Geese</figcaption>
        </figure>


        


  </main>

  <script src="gallery.js" defer></script>

</body>
</html>
