<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lucas Monroe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Photography by Lucas Monroe" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.png">
</head>
<body>

  <header class="site-header">
    <nav class="site-nav">
      <a href="/" class="site-nav__link" aria-label="Lucas Monroe home">Lucas <em>Monroe</em></a>
    </nav>
  </header>

  <main class="gallery">

    <!-- ─── Template ─────────────────────────────────────
    Copy a <figure> block below and change:
      1. Size class:  gallery__item--sm | --md | --lg | --xl | --xxl
      2. Image src and alt
      3. Caption text
    ──────────────────────────────────────────────────── -->
    <a href="street.html">
        <figure class="gallery__item gallery__item--lg">
            <img class="gallery__image" src="images/street/full/2-guys-truck.webp" alt="Two vendors resting by a truck on a Boston street" loading="eager" />
            <figcaption class="gallery__caption">Street</figcaption>
        </figure>
    </a>   
    <a href="graffiti.html">
        <figure class="gallery__item gallery__item--lg">
            <img class="gallery__image" src="images/graffiti/full/fire-mail.webp" alt="Colorful graffiti artwork on a mailbox" loading="eager" />
            <figcaption class="gallery__caption">Boston - The Graffiti Project</figcaption>
        </figure>
    </a>   
    <a href="garden.html">
        <figure class="gallery__item gallery__item--lg">
            <img class="gallery__image" src="images/garden/full/garden-morning.webp" alt="Misty morning in the Boston Public Garden" loading="lazy" />
            <figcaption class="gallery__caption">Boston - The Public Garden</figcaption>
        </figure>
    </a>   
    <a href="city.html">
        <figure class="gallery__item gallery__item--lg">
            <img class="gallery__image" src="images/city/full/bird-skyline.webp" alt="Bird flying over the Boston skyline at sunrise" loading="lazy" />
            <figcaption class="gallery__caption">Boston - The City</figcaption>
        </figure>
    </a>   

  </main>

  <script src="gallery.js" defer></script>

</body>
</html>
