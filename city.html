<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The City - Lucas Monroe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Photography by Lucas Monroe" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <nav class="site-nav">
      <a href="/" class="site-nav__link" aria-label="Lucas Monroe home">Lucas <em>Monroe</em></a>
    </nav>
  </header>

  <main class="gallery">

    <!-- ─── Template ─────────────────────────────────────
    Copy a <figure> block below and change:
      1. Size class:  gallery__item--sm | --md | --lg | --xl | --xxl
      2. Image src and alt
      3. Caption text
    ──────────────────────────────────────────────────── -->

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/city/full/crowd-sidewalk.webp" alt="Crowded sidewalk in Boston's North End" loading="eager" />
            <figcaption class="gallery__caption">North End Crowd</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/city/full/night-skyline.webp" alt="Boston skyline illuminated at night" loading="eager" />
            <figcaption class="gallery__caption">City Lights</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/city/full/science-plaza.webp" alt="Christian Science Plaza reflecting pool" loading="lazy" />
            <figcaption class="gallery__caption">Christian Science Plaza</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/city/full/downtown-storm.webp" alt="Storm clouds over downtown Boston" loading="lazy" />
            <figcaption class="gallery__caption">Downtown Storm</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/city/full/north-end-morning.webp" alt="Quiet morning street in the North End" loading="lazy" />
            <figcaption class="gallery__caption">North End Morning</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/city/full/fantasy.webp" alt="Ornate facade of the Burrage Mansion" loading="lazy" />
            <figcaption class="gallery__caption">Burrage Mansion</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/city/full/snow-walking.webp" alt="People walking through a snowy Boston street" loading="lazy" />
            <figcaption class="gallery__caption">Walking in the Snow</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/city/full/bird-skyline.webp" alt="Bird in flight over the Boston skyline at dawn" loading="lazy" />
            <figcaption class="gallery__caption">First Light Flight</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/city/full/empty-pond.webp" alt="Drained pond in Boston Common" loading="lazy" />
            <figcaption class="gallery__caption">No Water :&#40;</figcaption>
        </figure>

        

        


        


  </main>

  <script src="gallery.js" defer></script>

</body>
</html>
