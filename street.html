<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Street - Lucas Monroe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Photography by Lucas Monroe" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <nav class="site-nav">
      <a href="/" class="site-nav__link" aria-label="Lucas Monroe home">Lucas <em>Monroe</em></a>
    </nav>
  </header>

  <main class="gallery">

    <!-- ─── Template ─────────────────────────────────────
    Copy a <figure> block below and change:
      1. Size class:  gallery__item--sm | --md | --lg | --xl | --xxl
      2. Image src and alt
      3. Caption text
    ──────────────────────────────────────────────────── -->
        <figure class="gallery__item gallery__item--lg">
            <img class="gallery__image" src="images/street/full/4-workers.webp" alt="Four workers standing together on a Boston street" loading="eager" />
            <figcaption class="gallery__caption">Four Workers</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--md">
            <img class="gallery__image" src="images/street/full/street-reflection.webp" alt="Person reflected on a street" loading="eager" />
            <figcaption class="gallery__caption">Reflected Person</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--lg">
            <img class="gallery__image" src="images/street/full/red-trash.webp" alt="Person in red walking past a trash can" loading="lazy" />
            <figcaption class="gallery__caption">Red Walker</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--md">
            <img class="gallery__image" src="images/street/full/haymarket-storm.webp" alt="Shopper braving a storm at Haymarket" loading="lazy" />
            <figcaption class="gallery__caption">Shopper Braves Storm</figcaption>
        </figure>

         <figure class="gallery__item gallery__item--lg">
            <img class="gallery__image" src="images/street/full/2-guys-truck.webp" alt="Two vendors resting by a truck" loading="lazy" />
            <figcaption class="gallery__caption">Two Resting Vendors</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--lg">
            <img class="gallery__image" src="images/street/full/jewlery-store.webp" alt="Jewelry salesman at his store counter" loading="lazy" />
            <figcaption class="gallery__caption">Jewelry Salesman</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--md">
            <img class="gallery__image" src="images/street/full/tremont-storm.webp" alt="People walking through a storm on Tremont Street" loading="lazy" />
            <figcaption class="gallery__caption">People Brave Storm</figcaption>
        </figure>

        <figure class="gallery__item gallery__item--xl">
            <img class="gallery__image" src="images/street/full/to-dark.webp" alt="Three figures silhouetted in a pool of light" loading="lazy" />
            <figcaption class="gallery__caption">Walking Into Shadow</figcaption>
        </figure>


  </main>

  <script src="gallery.js" defer></script>

</body>
</html>
